{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Soil Predictor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
    crossorigin="anonymous"
  />
  <style>
    body { background: #f8fafc; }
    .card { border: 1px solid #e5e7eb; }
    .spinner {
      display: inline-block;
      width: 1rem;
      height: 1rem;
      border: 2px solid #e5e7eb;
      border-top-color: #0d6efd;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      vertical-align: text-bottom;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .description h3, .description h4 { margin-top: 1rem; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-body-tertiary">
    <div class="container">
      <a class="navbar-brand fw-semibold" href="#">Soil Predictor</a>
    </div>
  </nav>

  <main class="container py-4">
    {% csrf_token %}

    <div class="row justify-content-center">
      <div class="col-12 col-lg-8">
        <div class="card shadow-sm">
          <div class="card-body">
            <h5 class="card-title">Image Prediction</h5>
            <p class="text-muted mb-3">
              Upload a soil image to predict its type. After prediction, the app will generate a comprehensive, structured description using Gemini.
            </p>

            <form id="image-form" class="vstack gap-3" enctype="multipart/form-data">
              {% csrf_token %}
              <div>
                <label class="form-label" for="image">Soil Image</label>
                <input class="form-control" type="file" id="image" name="image" accept="image/*" required />
              </div>
              <div class="d-flex align-items-center gap-3">
                <button id="image-submit" type="submit" class="btn btn-primary">Predict</button>
                <div id="image-status" class="text-muted small"></div>
              </div>
            </form>

            <hr />
            <div id="image-result" class="fw-medium"></div>
            <div id="image-error" class="text-danger"></div>

            <div id="soil-details" class="description mt-3"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    // CSRF cookie helper
    function getCookie(name) {
      const value = `; ${document.cookie}`;
      const parts = value.split(`; ${name}=`);
      if (parts.length === 2) return parts.pop().split(';').shift();
    }
    const csrftoken = getCookie('csrftoken');

    const imageForm = document.getElementById('image-form');
    const imageSubmit = document.getElementById('image-submit');
    const imageStatus = document.getElementById('image-status');
    const imageResult = document.getElementById('image-result');
    const imageError = document.getElementById('image-error');
    const detailsBox = document.getElementById('soil-details');

    imageForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      imageResult.textContent = '';
      imageError.textContent = '';
      detailsBox.innerHTML = '';
      imageStatus.innerHTML = '<span class="spinner"></span> Predicting...';
      imageSubmit.disabled = true;

      const formData = new FormData(imageForm);

      try {
        const resp = await fetch("{% url 'soil_image_predict' %}"), {
          method: 'POST',
          body: formData,
          credentials: 'same-origin',
          headers: { 'X-CSRFToken': csrftoken },
        });

        const data = await resp.json();
        if (!data.ok) {
          imageError.textContent = data.error || 'Something went wrong.';
        } else {
          const soilType = data.prediction.soil_type;
          imageResult.textContent = `Predicted Soil Type: ${soilType}`;
          // Insert Gemini-provided HTML directly
          detailsBox.innerHTML = data.prediction.description_html || '';
        }
      } catch (err) {
        imageError.textContent = 'Network error. Please try again.';
      } finally {
        imageStatus.textContent = '';
        imageSubmit.disabled = false;
      }
    });
  </script>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
    crossorigin="anonymous"
  ></script>
</body>
</html>
